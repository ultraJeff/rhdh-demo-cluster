apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: deploy-app
  title: Deploy Application to OpenShift
  description: Deploy a containerized application to an OpenShift namespace using Ansible Automation Platform
  tags:
    - ansible
    - openshift
    - deployment
spec:
  owner: group:default/backstage-admins
  type: infrastructure

  parameters:
    - title: Application Details
      required:
        - projectName
        - appName
      properties:
        projectName:
          title: Target Namespace
          type: string
          description: The OpenShift namespace to deploy into
          pattern: "^[a-z][a-z0-9-]*$"
        appName:
          title: Application Name
          type: string
          description: Name for the deployment, service, and route
          pattern: "^[a-z][a-z0-9-]*$"
        appImage:
          title: Container Image
          type: string
          description: The container image to deploy
          default: registry.access.redhat.com/ubi9/httpd-24:latest
        replicaCount:
          title: Replicas
          type: string
          description: Number of pod replicas
          default: "1"
          enum:
            - "1"
            - "2"
            - "3"

  steps:
    - id: deploy
      name: Deploy application via Ansible
      action: rhaap:launch-job-template
      input:
        token: ${{ environment.secrets.aapToken }}
        values:
          template: Deploy Application
          extraVariables:
            project_name: ${{ parameters.projectName }}
            app_name: ${{ parameters.appName }}
            app_image: ${{ parameters.appImage }}
            replica_count: ${{ parameters.replicaCount }}

  output:
    links:
      - title: View application in OpenShift Console
        url: https://console-openshift-console.apps.tallgeese.ultra.lab/k8s/ns/${{ parameters.projectName }}/deployments/${{ parameters.appName }}
