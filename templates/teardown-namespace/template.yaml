apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: teardown-namespace
  title: Teardown Namespace
  description: Delete an OpenShift project and all its resources using Ansible Automation Platform
  tags:
    - ansible
    - openshift
    - infrastructure
spec:
  owner: user:default/admin
  type: infrastructure

  parameters:
    - title: Namespace to Delete
      required:
        - projectName
      properties:
        projectName:
          title: Project Name
          type: string
          description: The OpenShift namespace to delete
          pattern: "^[a-z][a-z0-9-]*$"
          ui:autofocus: true

  steps:
    - id: teardown
      name: Teardown namespace via Ansible
      action: rhaap:launch-job-template
      input:
        token: ${{ environment.secrets.aapToken }}
        values:
          template: Teardown Namespace
          extraVariables:
            project_name: ${{ parameters.projectName }}

  output:
    text:
      - title: Namespace deleted
        content: |
          **Namespace `${{ parameters.projectName }}`** and all its resources have been deleted.
